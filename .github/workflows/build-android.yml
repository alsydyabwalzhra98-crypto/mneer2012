name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create Android Project
        run: |
          mkdir -p app-android/app/src/main/java/com/alshifa/quran
          mkdir -p app-android/app/src/main/res/values

          cat > app-android/app/src/main/java/com/alshifa/quran/MainActivity.java << 'JAVA'
          package com.alshifa.quran;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          import android.view.Window;
          import android.view.WindowManager;
          import android.graphics.Color;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().setStatusBarColor(Color.parseColor("#0d3d2e"));
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  s.setSupportZoom(false);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setBackgroundColor(Color.WHITE);
                  webView.loadUrl("https://mneer2012.vercel.app");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) { webView.goBack(); } else { super.onBackPressed(); }
              }
          }
          JAVA

          cat > app-android/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application android:allowBackup="true" android:label="مركز الشفاء" android:theme="@style/AppTheme" android:usesCleartextTraffic="true">
                  <activity android:name="com.alshifa.quran.MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboard" android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          cat > app-android/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.DeviceDefault.Light.NoActionBar">
                  <item name="android:statusBarColor">#0d3d2e</item>
              </style>
          </resources>
          XML

          cat > app-android/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">مركز الشفاء</string></resources>
          XML

          cat > app-android/settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "AlShifa"
          include ':app'
          GRADLE

          cat > app-android/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.1.4' apply false
          }
          GRADLE

          cat > app-android/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.alshifa.quran'
              compileSdk 34
              defaultConfig {
                  applicationId "com.alshifa.quran.center"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          GRADLE

          echo "" > app-android/app/proguard-rules.pro

      - name: Build APK
        working-directory: app-android
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alshifa-apk
          path: app-android/app/build/outputs/apk/debug/*.apk
