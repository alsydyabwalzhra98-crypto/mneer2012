name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install Capacitor CLI
        run: bun add -D @capacitor/cli @capacitor/core

      - name: Sync Capacitor
        run: npx cap sync android
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Android Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sign Android Release APK (optional)
        if: github.event_name == 'push'
        working-directory: android
        run: |
          ./gradlew assembleRelease
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: alshifa-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alshifa-release-apk
          path: android/app/build/outputs/apk/release/*.apk
        continue-on-error: true

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          tag_name: v1.0.${{ github.run_number }}
          name: "تطبيق مركز الشفاء v1.0.${{ github.run_number }}"
          body: |
            ## مركز الشفاء لتحفيظ القرآن الكريم
            ### التغييرات:
            - بناء تلقائي لل APK
            - الإصدار التجريبي
          draft: false
          prerelease: true
        continue-on-error: true
